# docker-compose -f docker-compose-be.yml up -d
# docker-compose -f docker-compose-be.yml down
version: '3'

services:
  backend:
    image: carolinaortiz/springboot-sqlserver:3.0   # cambiar por tu usuario de dockerhub
    container_name: springboot-sqlserver
    ports:
      - "2000:2000"
    environment:
      - PORT=2000
      - SERVER_URL=http://localhost:2000
      - DATABASE_URL=jdbc:sqlserver://sql-server:1433;databaseName=agroTecno_db;encrypt=true;trustServerCertificate=true
      - DATABASE_USERNAME=sa
      - DATABASE_PASSWORD=Admin12345
      - DATABASE_DRIVER=com.microsoft.sqlserver.jdbc.SQLServerDriver
    networks:
      - my-network

# CONSUMIR UNA RED EXISTENTE CREADA POR OTRO COMPOSE
networks:
  my-network:
    external: true   # usa la red creada por el compose de la base de datos
    
